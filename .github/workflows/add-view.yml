name: ✦ Publish View (fallback)

# This workflow is a fallback for publishing without Claude Code.
# The primary way to publish is: tell Claude Code "publish this post" in chat.
#
# Usage here:
#   Actions → "Publish View" → Run workflow
#   Fill in title + paste your markdown content → Run

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Post title"
        required: true
        type: string
      content:
        description: "Post content (Markdown — write in Claude, paste here)"
        required: true
        type: string
      summary:
        description: "Short 1-2 sentence summary (auto-extracted if blank)"
        required: false
        type: string
        default: ""
      tags:
        description: "Comma-separated tags (e.g. ai, infrastructure, systems)"
        required: false
        type: string
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Publish post
        env:
          INPUT_TITLE:   ${{ inputs.title }}
          INPUT_CONTENT: ${{ inputs.content }}
          INPUT_SUMMARY: ${{ inputs.summary }}
          INPUT_TAGS:    ${{ inputs.tags }}
        run: |
          python3 publish.py \
            --title   "$INPUT_TITLE" \
            --content "$INPUT_CONTENT" \
            --summary "$INPUT_SUMMARY" \
            --tags    "$INPUT_TAGS" \
            --no-push

      - name: Commit and push
        run: |
          git config user.name "Views Bot"
          git config user.email "views@sangameshpatil.com"
          git add views-data.json
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "✦ Publish: ${{ inputs.title }}"
          git push origin HEAD
